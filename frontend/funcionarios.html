<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funcionarios</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Cadastro de Funcionarios</h1>
    <nav>
      <a href="index.html">Menu</a>
      <a href="cargos.html">Cargos</a>
      <a href="relatorio.html">Relatorio</a>
    </nav>

    <div class="card">
      <h2>Novo Funcionario</h2>
      <form id="funcionario-form">
        <div class="form-row">
          <input type="text" id="nome" placeholder="Nome *" required>
          <input type="text" id="cpf" placeholder="CPF (somente numeros) *" required>
        </div>
        <div class="form-row">
          <input type="date" id="data_nascimento" required>
          <input type="number" step="0.01" id="salario" placeholder="Salario *" required>
          <select id="cargo_id" required><option value="">Selecione o Cargo *</option></select>
        </div>
        <div class="form-row">
          <input type="email" id="email" placeholder="E-mail">
          <input type="tel" id="telefone" placeholder="Telefone">
        </div>
        <div class="section-title">Endereco Completo</div>
        <div class="form-row">
          <input type="text" id="cep" placeholder="CEP">
          <input type="text" id="logradouro" placeholder="Logradouro">
          <input type="text" id="numero" placeholder="Numero">
        </div>
        <div class="form-row">
          <input type="text" id="complemento" placeholder="Complemento">
          <input type="text" id="bairro" placeholder="Bairro">
          <input type="text" id="municipio" placeholder="Municipio">
          <input type="text" id="uf" placeholder="UF" maxlength="2">
        </div>
        <button type="submit">Salvar Funcionario</button>
      </form>
      <div id="funcionario-message" class="message"></div>
    </div>

    <div class="card">
      <h2>Pesquisar Funcionarios</h2>
      <div class="form-row">
        <input type="text" id="busca-nome" placeholder="Pesquisar por nome">
        <input type="text" id="busca-cpf" placeholder="Pesquisar por CPF">
        <button id="btn-buscar-funcionario">Pesquisar</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Nascimento</th>
            <th>Email</th>
            <th>Telefone</th>
            <th>Salario</th>
            <th>Cargo</th>
          </tr>
        </thead>
        <tbody id="funcionarios-body"></tbody>
      </table>
    </div>
  </div>
  <script src="js/funcionario.js"></script>
</body>
</html>
